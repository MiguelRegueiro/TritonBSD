name: Build Bootstrap Image

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build TritonBSD bootstrap memstick in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.1"
          usesh: true
          sync: rsync
          mem: 6144
          cpu: 4
          run: |
            freebsd-version
            uname -a
            ./build/build-remix-image.sh

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: tritonbsd-bootstrap-memstick
          path: artifacts/*.img.xz
          if-no-files-found: error
          retention-days: 7

