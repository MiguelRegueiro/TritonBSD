# Initial FreeBSD release.sh config for TritonBSD.
#
# Run from a FreeBSD builder after fetching src:
#
#   ./build/fetch-freebsd-src.sh
#   ./build/build-release.sh
#
# This first target should produce stock FreeBSD media. Triton overlay injection
# comes after the stock media build succeeds.

CHROOTDIR="/usr/obj/tritonbsd/release"
TARGET="amd64"
TARGET_ARCH="amd64"
KERNEL="GENERIC"

WITH_COMPRESSED_IMAGES="1"
WITH_DVD="1"

